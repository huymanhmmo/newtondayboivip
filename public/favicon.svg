<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0088cc" />
      <stop offset="100%" stop-color="#004488" />
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff9900" />
      <stop offset="100%" stop-color="#ff5500" />
    </linearGradient>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#004488" flood-opacity="0.15" />
    </filter>
  </defs>
  
  <!-- Outer circle with subtle glow -->
  <circle cx="64" cy="64" r="58" fill="#ffffff" filter="url(#glow)" />
  <circle cx="64" cy="64" r="54" fill="none" stroke="url(#dropGrad)" stroke-width="4" />
  
  <!-- Stylized water drop representing Newton Canswim -->
  <path d="M64,22 C64,22 88,48 88,68 C88,81.25 77.25,92 64,92 C50.75,92 40,81.25 40,68 C40,48 64,22 64,22 Z" fill="url(#dropGrad)" />
  
  <!-- Stylized wave cutout or swimmer in orange -->
  <path d="M48,68 C56,60 64,74 72,66 C76,62 78,56 80,52 C76,58 72,60 68,58 C60,54 52,66 48,68 Z" fill="url(#waveGrad)" />
  
  <!-- Dynamic splash circle -->
  <circle cx="64" cy="40" r="4" fill="#ffffff" />
  <circle cx="56" cy="50" r="3" fill="#ffffff" />
  <circle cx="72" cy="50" r="3" fill="#ffffff" />
</svg>
